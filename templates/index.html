<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Transferencia de Estilo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">🎨 Transferencia de Estilo Artístico</h1>
        <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="imagen" class="form-label">Sube tu imagen (.jpg):</label>
                    <input class="form-control" type="file" name="imagen" accept=".jpg" required>
                </div>
                <div class="mb-3">
                    <label for="estilo" class="form-label">Selecciona un estilo:</label>
                    <select class="form-select" name="estilo">
                        {% for estilo in estilos %}
                            <option value="{{ estilo }}">{{ estilo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Aplicar estilo</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
